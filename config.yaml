# ══════════════════════════════════════════
#  AI Farm Agent — Configuration
# ══════════════════════════════════════════

models:
  fast: "claude-haiku-4-5-20251001"
  strong: "claude-sonnet-4-20250514"

agent_models:
  maestro: strong          # Sonnet — interpreta intenção com precisão
  vision_maestro: fast
  data: fast
  web: fast
  code: strong             # Sonnet — gera código de qualidade
  desktop: strong          # Sonnet — resolve tarefas complexas
  file: fast
  memory: fast

limits:
  max_task_length: 2000
  max_steps_per_agent: 10
  max_subtasks: 5
  task_timeout_seconds: 120
  max_retries: 3
  max_tokens_fast: 1500
  max_tokens_strong: 4000

server:
  host: "127.0.0.1"
  port: 5000
  allowed_origins: "http://127.0.0.1:5000"

interaction:
  uia_timeout: 5
  uia_cache_seconds: 5
  vision_confidence_min: 0.15
  taskbar_margin_px: 60
  screenshot_max_width: 1280

waits:
  window_timeout: 15
  element_timeout: 10
  ocr_interval: 1.0
  poll_interval: 0.5

ocr:
  languages: ["pt", "en"]
  gpu: false
  confidence_min: 0.5

paths:
  captures_dir: "captures"
  reports_dir: "reports"
  logs_dir: "logs"
  workflows_dir: "memory/workflows"
  state_maps_dir: "state_maps"

security:
  blocked_commands:
    - "rm -rf"
    - "rmdir /s"
    - "format c"
    - "del /f /s"
    - "shutdown"
    - "reg delete"
    - "diskpart"
    - "bcdedit"